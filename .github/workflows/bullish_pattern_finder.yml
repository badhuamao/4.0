name: bullish_pattern_finder.yml

on:
  # 1. 手动运行触发
  workflow_dispatch:
    inputs:
      reason:
        # 已移除 description
        required: false
        default: 'Manual trigger'
        
  # 2. 脚本或工作流文件变动时自动运行
  push:
    paths:
      - 'bullish_pattern_finder.py'
      - '.github/workflows/bullish_pattern_finder.yml'

  # 3. 定时运行，每日北京时间 18:00 (UTC 10:00)
  schedule:
    - cron: '0 15 * * *' 

jobs:
  run_scanner:
    runs-on: ubuntu-latest

    # 设置时区为上海
    env:
      TZ: Asia/Shanghai

    # 确保权限允许写入内容
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout Repository (检出代码)
        uses: actions/checkout@v4
        # 必须拉取完整历史记录，否则后续推送可能失败
        with:
          fetch-depth: 0 

      - name: 🐍 Set up Python (设置 Python 环境)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: ⚙️ Install Dependencies (安装依赖)
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: 📈 Run Stock Scanner Script (运行扫描脚本)
        run: |
          # 确保输出目录存在
          mkdir -p scan_results
          python bullish_pattern_finder.py
        
      # === 关键修复：使用 Git Auto Commit Action 自动提交和推送 ===

      - name: 🔎 检查是否有新的结果文件
        id: git_status_check
        run: |
          # 检查 'scan_results' 目录下是否有变动
          if [[ -z $(git status --porcelain scan_results) ]]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: ⬆️ 自动提交并推送结果到仓库
        # 只有当脚本运行产生了新的结果文件时才执行推送
        if: steps.git_status_check.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # 指定文件模式为 'scan_results' 目录下的所有 CSV 文件
          file_pattern: 'scan_results/**/*.csv' 
          commit_message: '🤖 Auto: Add latest stock scan results (${{ env.TZ }})'
          commit_user_name: GitHub Actions Bot
          commit_user_email: actions@github.com
          # 💡 关键修复：强制推送以解决 non-fast-forward/fetch first 错误
          push_options: '--force'
