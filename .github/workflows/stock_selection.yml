name: 图 (Optimized Selector) - 修复版

# 控制何时触发此工作流
on:
  # 手动触发 (方便手动运行)
  workflow_dispatch:
    inputs:
      reason:
        description: '手动运行的原因'
        required: false
        default: 'Manual trigger'
  
  # 自动触发：当脚本或工作流文件变动时自动运行
  push:
    paths:
      - 'stock_selector.py'
      - '.github/workflows/stock_selection.yml'
  
  # 🚀 定时运行，每日北京时间 18:00 (UTC 10:00)
  schedule:
    - cron: '0 15 * * *'  # 每日 UTC 10:00 运行

# 设置工作流的默认时区为亚洲/上海，以便脚本中的时间戳与时区一致
env:
  TZ: 'Asia/Shanghai'

jobs:
  select_and_commit:
    runs-on: ubuntu-latest

    steps:
    - name: ⬇️ 检出代码 (Fetch Full History)
      uses: actions/checkout@v4
      # 必须拉取完整历史记录，防止后续推送失败
      with:
        fetch-depth: 0
        ref: ${{ github.ref }} 
        token: ${{ secrets.GITHUB_TOKEN }} # 保持 token，确保拉取权限

    - name: 🐍 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: ⚙️ 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy

    - name: 运行脚本 (Run Selector)
      run: |
        # 确保数据目录存在
        mkdir -p stock_data
        
        # 运行脚本（已内置多进程加速）
        python stock_selector.py

    # --- 关键优化 1: 在提交前拉取最新远程更改 ---
    # 这可以解决日志中出现的分支发散问题，避免推送失败。
    - name: 🔄 Git Pull Rebase (同步远程)
      if: always() # 确保即使前面步骤失败也会尝试同步
      run: |
        echo "尝试从远程拉取最新更改并Rebase..."
        # 使用 --rebase 保持历史记录线性，如果拉取失败则不中断流程 (|| true)
        git pull --rebase origin ${{ github.ref }} || true
        echo "Git Pull/Rebase 尝试完成。"
    # --------------------------------------------------

    - name: 检查是否有新的选股结果 (使用 $GITHUB_OUTPUT)
      id: git_status
      run: |
        # 检查是否有新的 .csv 文件被创建或修改
        if [[ -n $(git status --porcelain) ]]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi

    # 只有当脚本运行产生了新的结果文件时才执行推送
    - name: ⬆️ 推送选股结果到仓库
      if: steps.git_status.outputs.has_changes == 'true'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        file_pattern: '**/*.csv'
        commit_message: '🤖 Auto commit: New stock selection results for ${{ env.TZ }}'
        commit_user_name: GitHub Actions Bot
        commit_user_email: actions@github.com
        push_options: '' # 移除 --force
        # 💡 关键优化 2: 移除多余的 token，避免警告
        # token: ${{ secrets.GITHUB_TOKEN }} # 移除此行，action 默认使用 GITHUB_TOKEN
