name: V5.0

on:
  workflow_dispatch:      # 手动触发
  push:
    paths:
      - 'stock_screener_v5.py'
      - '.github/workflows/stock_screener_v5.yml'
      - 'stock_data/**'       
  schedule:
    # ----------------------------------------------------
    # 定时触发：UTC 10:00，即北京时间 18:00
    - cron: '0 15 * * *'  
    # ----------------------------------------------------

jobs:
  run-screener:
    runs-on: ubuntu-latest
    env:
      
      TZ: Asia/Shanghai
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 确保拉取完整历史记录
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytz
      
      - name: Run stock screener
        run: python stock_screener_v5.py
      
      # 核心修复步骤：确保 git pull --rebase 在干净的状态下运行
      - name: Commit and push reports (修复冲突 V5.1)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. 暂存所有更改 (新报告文件)
          git add .
          
          # 2. **【修复关键步骤】** 如果暂存区有更改，先进行临时提交。
          #    这确保了工作区/暂存区是干净的，允许 'git pull --rebase' 执行。
          #    --staged 检查暂存区是否有更改。
          if git diff --quiet --staged; then
            echo "No report changes to commit yet."
          else
            # 创建临时提交 (WIP)
            git commit -m "WIP: Automated report data before rebase"
          fi
          
          # 3. 尝试拉取远程更改，解决冲突
          #    如果远程有更新，会将上面的 WIP 提交放到远程更新之上。
          git pull --rebase
          
          # 4. **最终提交：** 检查是否有任何未提交的更改（可能来自 rebase 解决冲突后的文件），
          #    并创建最终的、包含 [skip ci] 标签的提交。
          #    注意：如果第 2 步创建了 WIP 提交，这个提交将合并或替换它。
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update stock report $(date +'%Y-%m-%d %H:%M') [skip ci]"
          
          # 5. 推送更改
          git push
